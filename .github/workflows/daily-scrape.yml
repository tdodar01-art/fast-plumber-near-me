name: Daily Plumber Scrape

on:
  schedule:
    # 6 AM Central = 11:00 UTC (CDT) or 12:00 UTC (CST)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/plumbers-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase firebase-admin typescript tsx googleapis

      - name: Check Firebase config
        id: firebase
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup service account
        if: steps.firebase.outputs.configured == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json

      # Phase 0: GSC-driven expansion — find cities Google is testing
      - name: GSC Expansion Check
        if: steps.firebase.outputs.configured == 'true'
        continue-on-error: true
        env:
          GSC_SITE_URL: https://www.fastplumbernearme.com/
        run: |
          echo "=== STAGE: GSC EXPANSION START ==="
          node scripts/gsc-expansion.js

      - name: Prepend GSC cities to scrape queue
        continue-on-error: true
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          echo "=== STAGE: GSC PREPEND START ==="
          node scripts/gsc-prepend-queue.js

      # Phase 1: Expansion -- scrape new cities (60% of budget)
      - name: Run daily scrape (expansion)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
        run: |
          echo "=== STAGE: SCRAPE START ==="
          node scripts/daily-scrape.js

      # Upload scraped data to Firestore
      - name: Upload to Firestore
        if: steps.firebase.outputs.configured == 'true'
        continue-on-error: true
        run: |
          echo "=== STAGE: UPLOAD START ==="
          node scripts/upload-to-firestore.js

      # Phase 2: Review refresh -- accumulate reviews for existing plumbers (30% of budget)
      - name: Refresh reviews
        if: steps.firebase.outputs.configured == 'true'
        continue-on-error: true
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          echo "=== STAGE: REFRESH REVIEWS START ==="
          npx tsx scripts/refresh-reviews.ts --max 20

      # ---------------------------------------------------------------------
      # PUBLISH GATE — export/commit/indexing run BEFORE scoring.
      # Phase 1 guarantee: the site MUST update daily even if scoring stalls.
      # score-plumbers.ts was moved below this block; its output lags by one
      # day at worst (rebuild-json.yml safety net catches scoring-only writes
      # every 6 hours). Do NOT reorder these steps above scoring without
      # reading docs/pipeline-audit-2026-04-20.md and CLAUDE.md first.
      # ---------------------------------------------------------------------

      # Phase 3: Rebuild derived JSON from Firestore (single source of truth)
      # export-firestore-to-json.js is the SOLE writer to plumbers-synthesized.json.
      # MUST RUN — no continue-on-error. Publishing must never silently fail.
      - name: Rebuild JSON from Firestore
        if: steps.firebase.outputs.configured == 'true'
        run: |
          echo "=== STAGE: EXPORT START ==="
          node scripts/export-firestore-to-json.js --no-push

      # Phase 3b: Regenerate city-coverage.ts so the sitemap picks up any new
      # city × service combinations enabled by today's scrape. Depends on the
      # freshly-rebuilt plumbers-synthesized.json + city-coords.ts.
      - name: Regenerate city coverage
        continue-on-error: true
        run: node scripts/generate-city-coverage.js

      # Single commit: scrape queue, city coords, cities registry, coverage map,
      # GSC queue, and rebuilt JSON. cities-generated.ts + city-coverage.ts are
      # included so the sitemap reflects newly-discovered cities and newly-
      # covered city × service combos on the next Vercel rebuild.
      - name: Commit and push
        working-directory: .
        run: |
          echo "=== STAGE: COMMIT START ==="
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/plumbers-web/data/synthesized/plumbers-synthesized.json apps/plumbers-web/data/synthesized/leaderboard.json apps/plumbers-web/data/raw/plumbers-latest.json apps/plumbers-web/scripts/scrape-queue.json apps/plumbers-web/data/gsc-expansion-queue.json apps/plumbers-web/src/lib/city-coords.ts apps/plumbers-web/src/lib/cities-generated.ts apps/plumbers-web/src/lib/city-coverage.ts
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            CITIES=$(node -e "const r=require('./apps/plumbers-web/data/logs/daily-result-$(date +%Y-%m-%d).json');console.log(r.citiesProcessed.map(c=>c.city).join(', '))" 2>/dev/null || echo "unknown")
            NEW=$(node -e "const r=require('./apps/plumbers-web/data/logs/daily-result-$(date +%Y-%m-%d).json');console.log(r.newPlumbers)" 2>/dev/null || echo "0")
            git commit -m "Daily scrape: +${NEW} plumbers from ${CITIES}"
            git push
          fi

      # Phase 4: Request indexing for updated city pages
      - name: Request indexing for scraped cities
        if: steps.firebase.outputs.configured == 'true'
        continue-on-error: true
        env:
          GSC_SITE_URL: https://www.fastplumbernearme.com/
        run: |
          echo "=== STAGE: INDEXING START ==="
          LOG="data/logs/daily-result-$(date +%Y-%m-%d).json"
          if [ ! -f "$LOG" ]; then
            echo "No daily result log found — skipping indexing."
            exit 0
          fi
          URLS=$(node -e "
            const r = require('./$LOG');
            const slugify = (t) => t.toLowerCase().replace(/\./g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
            const cities = r.citiesProcessed || [];
            if (cities.length === 0) { process.exit(0); }
            // Each city in the log has a .city and we need to find its state+slug
            // The log doesn't store state/slug, so read the synthesized data to match
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('data/synthesized/plumbers-synthesized.json','utf-8'));
            const urls = new Set();
            for (const c of cities) {
              const match = data.plumbers.find(p => p.city === c.city);
              if (match) {
                const stateSlug = match.state.toLowerCase();
                // Map state abbr to full slug
                const abbrs = {AL:'alabama',AK:'alaska',AZ:'arizona',AR:'arkansas',CA:'california',CO:'colorado',CT:'connecticut',DE:'delaware',FL:'florida',GA:'georgia',HI:'hawaii',ID:'idaho',IL:'illinois',IN:'indiana',IA:'iowa',KS:'kansas',KY:'kentucky',LA:'louisiana',ME:'maine',MD:'maryland',MA:'massachusetts',MI:'michigan',MN:'minnesota',MS:'mississippi',MO:'missouri',MT:'montana',NE:'nebraska',NV:'nevada',NH:'new-hampshire',NJ:'new-jersey',NM:'new-mexico',NY:'new-york',NC:'north-carolina',ND:'north-dakota',OH:'ohio',OK:'oklahoma',OR:'oregon',PA:'pennsylvania',RI:'rhode-island',SC:'south-carolina',SD:'south-dakota',TN:'tennessee',TX:'texas',UT:'utah',VT:'vermont',VA:'virginia',WA:'washington',WV:'west-virginia',WI:'wisconsin',WY:'wyoming',DC:'district-of-columbia'};
                const ss = abbrs[match.state] || stateSlug;
                urls.add('/emergency-plumbers/' + ss + '/' + slugify(c.city));
              }
            }
            if (urls.size > 0) console.log([...urls].join(' '));
          " 2>/dev/null)
          if [ -z "$URLS" ]; then
            echo "No city URLs to index."
            node scripts/request-indexing.js --sitemap-only
          else
            echo "Requesting indexing for: $URLS"
            node scripts/request-indexing.js $URLS
          fi

      # ---------------------------------------------------------------------
      # SCORING (best-effort, may cancel) — runs AFTER publishing.
      # If this step times out or fails, today's publish is already done.
      # Scoring writes to Firestore; the next rebuild-json.yml run (every 6h)
      # will export those scores into JSON.
      # ---------------------------------------------------------------------
      - name: Score and synthesize plumbers
        if: steps.firebase.outputs.configured == 'true'
        continue-on-error: true
        timeout-minutes: 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "=== STAGE: SCORING START ==="
          npx tsx scripts/score-plumbers.ts --pass all

      - name: Cleanup service account
        if: always()
        run: rm -f service-account.json
