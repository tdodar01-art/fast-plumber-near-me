name: Daily Plumber Scrape

on:
  schedule:
    # 6 AM Central = 11:00 UTC (CDT) or 12:00 UTC (CST)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin typescript ts-node @anthropic-ai/sdk

      - name: Setup service account
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json

      # Phase 1: Expansion — scrape new cities (60% of budget)
      - name: Run daily scrape (expansion)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/daily-scrape.js
        continue-on-error: true

      # Upload scraped data to Firestore
      - name: Upload to Firestore
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: node scripts/upload-to-firestore.js
        continue-on-error: true

      # Phase 2: Review refresh — accumulate reviews for existing plumbers (30% of budget)
      - name: Refresh reviews
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: npx ts-node --esm scripts/refresh-reviews.ts --max 20
        continue-on-error: true

      # Phase 3: AI synthesis — analyze reviews for plumbers with new data
      - name: Synthesize reviews
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: npx ts-node --esm scripts/synthesize-reviews.ts
        continue-on-error: true

      - name: Cleanup service account
        if: always()
        run: rm -f service-account.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/ scripts/scrape-queue.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/plumbers-latest.json data/synthesized/plumbers-synthesized.json data/synthesized/leaderboard.json scripts/scrape-queue.json
          CITIES=$(node -e "const r=require('./data/logs/daily-result-$(date +%Y-%m-%d).json');console.log(r.citiesProcessed.map(c=>c.city).join(', '))" 2>/dev/null || echo "unknown")
          NEW=$(node -e "const r=require('./data/logs/daily-result-$(date +%Y-%m-%d).json');console.log(r.newPlumbers)" 2>/dev/null || echo "0")
          git commit -m "Daily scrape: +${NEW} plumbers from ${CITIES}"
          git push
