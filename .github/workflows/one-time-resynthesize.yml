name: One-Time Emergency Readiness Re-Synthesis

on:
  schedule:
    # 8 AM Central = 14:00 UTC (CDT) on April 7, 2026
    - cron: '0 14 7 4 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resynthesize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/plumbers-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin googleapis

      - name: Setup service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json

      - name: Run emergency readiness re-synthesis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/resynthesize-emergency.js

      - name: Cleanup service account
        if: always()
        run: rm -f service-account.json

      - name: Self-destruct workflow
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          rm .github/workflows/one-time-resynthesize.yml
          git add .github/workflows/one-time-resynthesize.yml
          git commit -m "chore: remove one-time resynthesize workflow (completed)"
          git push
