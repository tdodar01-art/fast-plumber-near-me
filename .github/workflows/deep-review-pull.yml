name: Deep Review Pull (Outscraper)

on:
  workflow_dispatch: # Manual trigger only — cron disabled 2026-04-23

permissions:
  contents: write

jobs:
  deep-reviews:
    runs-on: ubuntu-latest
    # Per-plumber Yelp fallback (Google-search-for-Yelp → scrape) can take
    # ~3 min each; at 20 plumbers × 3 cities the job regularly blew past 30.
    # 120 gives room for all 3 cities to complete in the usual case.
    timeout-minutes: 120
    defaults:
      run:
        working-directory: apps/plumbers-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin outscraper googleapis typescript tsx @anthropic-ai/sdk

      - name: Check secrets
        id: secrets
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ] && [ -n "$OUTSCRAPER_API_KEY" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "Missing required secrets. FIREBASE_SERVICE_ACCOUNT or OUTSCRAPER_API_KEY not set."
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}

      - name: Setup service account
        if: steps.secrets.outputs.configured == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json

      # Query Firestore for high-traction cities, filter stale ones, cap at 3
      - name: Find qualifying cities
        if: steps.secrets.outputs.configured == 'true'
        id: cities
        run: |
          echo "=== STAGE: FIND CITIES START ==="
          CITY_SLUGS=$(node scripts/find-deep-review-cities.js 2>&1)
          EXIT_CODE=$?

          # Extract just the last line (stdout) as city slugs — stderr goes to log
          SLUGS=$(echo "$CITY_SLUGS" | tail -1)
          echo "$CITY_SLUGS" | head -n -1  # print logs

          if [ $EXIT_CODE -ne 0 ] || [ -z "$SLUGS" ] || echo "$SLUGS" | grep -q "^No \|^All \|^FATAL\|^ERROR\|^DEBUG"; then
            echo "No cities to process."
            echo "slugs=" >> $GITHUB_OUTPUT
          else
            echo "Cities to process: $SLUGS"
            echo "slugs=$SLUGS" >> $GITHUB_OUTPUT
          fi

      # BBB lookup BEFORE reviews so synthesis has BBB data available
      - name: BBB lookup for qualifying cities
        if: steps.secrets.outputs.configured == 'true' && steps.cities.outputs.slugs != ''
        continue-on-error: true
        run: |
          echo "=== STAGE: BBB LOOKUP START ==="
          for SLUG in ${{ steps.cities.outputs.slugs }}; do
            echo "BBB lookup for: $SLUG"
            node scripts/bbb-lookup.js "$SLUG" || true
            sleep 2
          done

      # Run outscraper-reviews.js for each city (one at a time for error isolation)
      - name: Pull reviews for city 1
        if: steps.secrets.outputs.configured == 'true' && steps.cities.outputs.slugs != ''
        continue-on-error: true
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: |
          echo "=== STAGE: OUTSCRAPER CITY 1 START ==="
          SLUG=$(echo "${{ steps.cities.outputs.slugs }}" | awk '{print $1}')
          if [ -n "$SLUG" ]; then
            echo "Processing city 1: $SLUG"
            node scripts/outscraper-reviews.js "$SLUG"
          fi

      - name: Pull reviews for city 2
        if: steps.secrets.outputs.configured == 'true' && steps.cities.outputs.slugs != ''
        continue-on-error: true
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: |
          echo "=== STAGE: OUTSCRAPER CITY 2 START ==="
          SLUG=$(echo "${{ steps.cities.outputs.slugs }}" | awk '{print $2}')
          if [ -n "$SLUG" ]; then
            echo "Processing city 2: $SLUG"
            node scripts/outscraper-reviews.js "$SLUG"
          fi

      - name: Pull reviews for city 3
        if: steps.secrets.outputs.configured == 'true' && steps.cities.outputs.slugs != ''
        continue-on-error: true
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: |
          echo "=== STAGE: OUTSCRAPER CITY 3 START ==="
          SLUG=$(echo "${{ steps.cities.outputs.slugs }}" | awk '{print $3}')
          if [ -n "$SLUG" ]; then
            echo "Processing city 3: $SLUG"
            node scripts/outscraper-reviews.js "$SLUG"
          fi

      # ---------------------------------------------------------------------
      # PUBLISH GATE — export/commit/indexing run BEFORE scoring.
      # Phase 1 guarantee: the site MUST update daily even if scoring stalls.
      # score-plumbers.ts was moved below this block; rebuild-json.yml picks
      # up any scoring-only writes every 6 hours.
      # Do NOT reorder these steps above scoring without reading
      # docs/pipeline-audit-2026-04-20.md and CLAUDE.md first.
      # ---------------------------------------------------------------------

      # Export Firestore enrichment to static JSON → commit → push → Vercel rebuild
      - name: Git setup and pull
        if: steps.secrets.outputs.configured == 'true' && steps.cities.outputs.slugs != ''
        continue-on-error: true
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true

      # MUST RUN — no continue-on-error. Publishing must never silently fail.
      - name: Export Firestore to static JSON
        if: steps.secrets.outputs.configured == 'true' && steps.cities.outputs.slugs != ''
        id: export
        run: |
          echo "=== STAGE: EXPORT START ==="
          node scripts/export-firestore-to-json.js | tee /tmp/export-output.txt

          # Parse affected cities for indexing step
          CITIES=$(grep '__AFFECTED_CITIES__:' /tmp/export-output.txt | sed 's/.*__AFFECTED_CITIES__://' || true)
          echo "affected_cities=$CITIES" >> $GITHUB_OUTPUT

      # Request indexing for ALL city pages served by updated plumbers.
      #
      # `affected_cities` is a list of city slugs (e.g. `pflugerville`). For
      # each, we look up its state in plumbers-synthesized.json, build a
      # `{citySlug}:{stateAbbr}` pair, and pass to `build-indexing-urls.js`,
      # which expands the pair into every URL variant Google has actually
      # indexed for that city (read from `gscPageTypes` in Firestore). This
      # makes the recrawl ping land on the service-prefixed pages
      # (`/24-hour-plumber/...`, `/clogged-drain/...`, etc.) that earn
      # impressions — not only the canonical `/emergency-plumbers/...` URL
      # which Google often hasn't crawled.
      - name: Request indexing for affected cities
        if: steps.secrets.outputs.configured == 'true' && steps.export.outputs.affected_cities != '' && steps.export.outputs.affected_cities != '[]'
        continue-on-error: true
        env:
          GSC_SITE_URL: https://www.fastplumbernearme.com/
        run: |
          echo "=== STAGE: INDEXING START ==="
          npm install googleapis 2>/dev/null

          PAIRS=$(node -e "
            const fs = require('fs');
            const cities = ${{ steps.export.outputs.affected_cities || '[]' }};
            if (!cities.length) process.exit(0);
            const data = JSON.parse(fs.readFileSync('data/synthesized/plumbers-synthesized.json','utf-8'));
            const cityState = new Map();
            data.plumbers.forEach(p => (p.serviceCities||[]).forEach(c => { if (!cityState.has(c) && p.state) cityState.set(c, p.state); }));
            const pairs = cities.map(c => {
              const state = cityState.get(c);
              return state ? c + ':' + state.toUpperCase() : null;
            }).filter(Boolean);
            if (pairs.length) console.log(pairs.join(' '));
          " 2>/dev/null)

          if [ -z "$PAIRS" ]; then
            echo "No affected cities resolved to state — skipping indexing."
            exit 0
          fi
          echo "Resolving GSC-indexed URL variants for: $PAIRS"
          URLS=$(node scripts/build-indexing-urls.js $PAIRS)
          if [ -n "$URLS" ]; then
            echo "Requesting indexing for $(echo "$URLS" | wc -l | tr -d ' ') URL(s):"
            echo "$URLS"
            node scripts/request-indexing.js $URLS
          fi

      # ---------------------------------------------------------------------
      # SCORING (best-effort, may cancel) — runs AFTER publishing.
      # Outscraper provides the rich review data. Scoring writes scores/decision
      # fields to Firestore; next rebuild-json.yml exports them into JSON.
      # ---------------------------------------------------------------------
      - name: Score and synthesize plumbers
        if: steps.secrets.outputs.configured == 'true' && steps.cities.outputs.slugs != ''
        continue-on-error: true
        timeout-minutes: 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "=== STAGE: SCORING START ==="
          npx tsx scripts/score-plumbers.ts --pass all

      - name: Cleanup service account
        if: always()
        run: rm -f service-account.json
